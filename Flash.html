<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Adaptive Beat Sync</title>
                <style>
                        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #111; color: white; margin: 0; padding: 20px; box-sizing: border-box; }
                                button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; background: #1DB954; color: white; margin: 10px; width: 100%; max-width: 300px; }
                                        button:disabled { background: #444; color: #888; cursor: not-allowed; }
                                                #status { margin-top: 15px; text-align: center; line-height: 1.5; color: #ccc; }
                                                        #meter { width: 100%; max-width: 300px; height: 20px; background: #333; border-radius: 10px; margin-top: 20px; overflow: hidden; position: relative; }
                                                                #fill { width: 0%; height: 100%; background: #1DB954; transition: width 0.05s; }
                                                                        #threshold-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: red; z-index: 10; transition: left 0.1s linear; }
                                                                                .controls { width: 100%; max-width: 300px; margin-top: 30px; background: #222; padding: 15px; border-radius: 10px; box-sizing: border-box; }
                                                                                        input[type="range"] { width: 100%; margin-top: 10px; }
                                                                                                label { font-size: 0.9rem; color: #aaa; }
                                                                                                        .debug-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-top: 10px; }
                                                                                                            </style>
                                                                                                            </head>
                                                                                                            <body>

                                                                                                                <h2>Adaptive Auto-Sync</h2>
                                                                                                                    <button id="startBtn">Start Listening</button>
                                                                                                                        <button id="stopBtn" disabled>Stop</button>
                                                                                                                            
                                                                                                                                <div id="meter">
                                                                                                                                        <div id="fill"></div>
                                                                                                                                                <div id="threshold-marker"></div>
                                                                                                                                                    </div>
                                                                                                                                                        
                                                                                                                                                            <div class="controls">
                                                                                                                                                                    <label for="dutySlider">Target Duty Cycle: <span id="dutyValue">5</span>%</label><br>
                                                                                                                                                                            <small style="font-size: 0.7rem; color: #666;">How often the light should be ON vs OFF.</small>
                                                                                                                                                                                    <input type="range" id="dutySlider" min="1" max="25" value="5">
                                                                                                                                                                                            
                                                                                                                                                                                                    <div class="debug-info">
                                                                                                                                                                                                                <span id="liveDuty">Live Duty: 0%</span>
                                                                                                                                                                                                                            <span id="liveThresh">Thresh: 190</span>
                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                            <div id="status">Waiting to start...</div>

                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                        const startBtn = document.getElementById('startBtn');
                                                                                                                                                                                                                                                                const stopBtn = document.getElementById('stopBtn');
                                                                                                                                                                                                                                                                        const status = document.getElementById('status');
                                                                                                                                                                                                                                                                                const fill = document.getElementById('fill');
                                                                                                                                                                                                                                                                                        const dutySlider = document.getElementById('dutySlider');
                                                                                                                                                                                                                                                                                                const dutyValue = document.getElementById('dutyValue');
                                                                                                                                                                                                                                                                                                        const thresholdMarker = document.getElementById('threshold-marker');
                                                                                                                                                                                                                                                                                                                const liveDutyDisplay = document.getElementById('liveDuty');
                                                                                                                                                                                                                                                                                                                        const liveThreshDisplay = document.getElementById('liveThresh');

                                                                                                                                                                                                                                                                                                                                let stream = null;
                                                                                                                                                                                                                                                                                                                                        let videoTrack = null;
                                                                                                                                                                                                                                                                                                                                                let audioContext = null;
                                                                                                                                                                                                                                                                                                                                                        let analyser = null;
                                                                                                                                                                                                                                                                                                                                                                let dataArray = null;
                                                                                                                                                                                                                                                                                                                                                                        let loopId = null;
                                                                                                                                                                                                                                                                                                                                                                                let torchState = false;
                                                                                                                                                                                                                                                                                                                                                                                        let isToggling = false;
                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                        // Adaptive System Variables
                                                                                                                                                                                                                                                                                                                                                                                                                let targetDuty = parseInt(dutySlider.value) / 100; // e.g., 0.05
                                                                                                                                                                                                                                                                                                                                                                                                                        let currentDuty = 0.0;
                                                                                                                                                                                                                                                                                                                                                                                                                                let adaptiveThreshold = 190; // Start at a reasonable middle ground

                                                                                                                                                                                                                                                                                                                                                                                                                                        // Update target duty cycle when slider moves
                                                                                                                                                                                                                                                                                                                                                                                                                                                dutySlider.addEventListener('input', (e) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            targetDuty = parseInt(e.target.value) / 100;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        dutyValue.innerText = e.target.value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        startBtn.addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    status.innerHTML = "Requesting camera & mic...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    stream = await navigator.mediaDevices.getUserMedia({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        audio: true,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            video: { facingMode: 'environment' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            videoTrack = stream.getVideoTracks()[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const capabilities = videoTrack.getCapabilities();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (!capabilities.torch) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                throw new Error("Flashlight API not supported.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const source = audioContext.createMediaStreamSource(stream);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                analyser = audioContext.createAnalyser();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                analyser.fftSize = 128; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                source.connect(analyser);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                dataArray = new Uint8Array(analyser.frequencyBinCount);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                startBtn.disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                stopBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                status.innerHTML = "Auto-tuning to the music...";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                loop();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            status.innerHTML = `<strong>Error:</strong> ${err.message}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.error(err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        stopBtn.addEventListener('click', () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (loopId) cancelAnimationFrame(loopId);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (videoTrack) setTorch(false);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (stream) stream.getTracks().forEach(track => track.stop());
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (audioContext) audioContext.close();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                startBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            stopBtn.disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        status.innerHTML = "Stopped.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fill.style.width = "0%";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                currentDuty = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function setTorch(state) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (isToggling || torchState === state) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        isToggling = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    await videoTrack.applyConstraints({ advanced: [{ torch: state }] });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    torchState = state;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                console.error("Failed to toggle torch", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        isToggling = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function loop() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loopId = requestAnimationFrame(loop);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                analyser.getByteFrequencyData(dataArray);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Isolate Bass Frequencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let bassSum = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const bassBins = 3; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                for(let i = 0; i < bassBins; i++) { bassSum += dataArray[i]; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let bassAverage = bassSum / bassBins;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Check if current frame is considered a "Beat"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let isBeat = bassAverage > adaptiveThreshold;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // --- ADAPTIVE THRESHOLD LOGIC ---
