<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Beat Sync Flashlight</title>
                <style>
                        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #111; color: white; margin: 0; padding: 20px; box-sizing: border-box; }
                                button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; background: #1DB954; color: white; margin: 10px; width: 100%; max-width: 300px; }
                                        button:disabled { background: #444; color: #888; cursor: not-allowed; }
                                                #status { margin-top: 15px; text-align: center; line-height: 1.5; color: #ccc; }
                                                        #meter { width: 100%; max-width: 300px; height: 20px; background: #333; border-radius: 10px; margin-top: 20px; overflow: hidden; position: relative; }
                                                                #fill { width: 0%; height: 100%; background: #1DB954; transition: width 0.05s; }
                                                                        #threshold-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: red; z-index: 10; }
                                                                                .controls { width: 100%; max-width: 300px; margin-top: 30px; background: #222; padding: 15px; border-radius: 10px; box-sizing: border-box; }
                                                                                        input[type="range"] { width: 100%; margin-top: 10px; }
                                                                                                label { font-size: 0.9rem; color: #aaa; }
                                                                                                    </style>
                                                                                                    </head>
                                                                                                    <body>

                                                                                                        <h2>Beat Sync Flashlight</h2>
                                                                                                            <button id="startBtn">Start Listening</button>
                                                                                                                <button id="stopBtn" disabled>Stop</button>
                                                                                                                    
                                                                                                                        <div id="meter">
                                                                                                                                <div id="fill"></div>
                                                                                                                                        <div id="threshold-marker" style="left: 75%;"></div>
                                                                                                                                            </div>
                                                                                                                                                
                                                                                                                                                    <div class="controls">
                                                                                                                                                            <label for="sensitivity">Beat Threshold: <span id="sensValue">100</span></label><br>
                                                                                                                                                                    <small style="font-size: 0.7rem; color: #666;">Lower this if the light isn't turning on. Raise it if it stays on too long.</small>
                                                                                                                                                                            <input type="range" id="sensitivity" min="50" max="255" value="190">
                                                                                                                                                                                </div>

                                                                                                                                                                                    <div id="status">Waiting to start...</div>

                                                                                                                                                                                        <script>
                                                                                                                                                                                                const startBtn = document.getElementById('startBtn');
                                                                                                                                                                                                        const stopBtn = document.getElementById('stopBtn');
                                                                                                                                                                                                                const status = document.getElementById('status');
                                                                                                                                                                                                                        const fill = document.getElementById('fill');
                                                                                                                                                                                                                                const sensitivitySlider = document.getElementById('sensitivity');
                                                                                                                                                                                                                                        const sensValue = document.getElementById('sensValue');
                                                                                                                                                                                                                                                const thresholdMarker = document.getElementById('threshold-marker');

                                                                                                                                                                                                                                                        let stream = null;
                                                                                                                                                                                                                                                                let videoTrack = null;
                                                                                                                                                                                                                                                                        let audioContext = null;
                                                                                                                                                                                                                                                                                let analyser = null;
                                                                                                                                                                                                                                                                                        let dataArray = null;
                                                                                                                                                                                                                                                                                                let loopId = null;
                                                                                                                                                                                                                                                                                                        let torchState = false;
                                                                                                                                                                                                                                                                                                                let isToggling = false;
                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                // Default threshold (0-255 scale of audio energy)
                                                                                                                                                                                                                                                                                                                                        let threshold = parseInt(sensitivitySlider.value);

                                                                                                                                                                                                                                                                                                                                                // Update threshold when slider moves
                                                                                                                                                                                                                                                                                                                                                        sensitivitySlider.addEventListener('input', (e) => {
                                                                                                                                                                                                                                                                                                                                                                    threshold = parseInt(e.target.value);
                                                                                                                                                                                                                                                                                                                                                                                sensValue.innerText = threshold;
                                                                                                                                                                                                                                                                                                                                                                                            // Move the red line on the meter so you can see the target
                                                                                                                                                                                                                                                                                                                                                                                                        thresholdMarker.style.left = `${(threshold / 255) * 100}%`; 
                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                // Initialize marker position
                                                                                                                                                                                                                                                                                                                                                                                                                                        thresholdMarker.style.left = `${(threshold / 255) * 100}%`;

                                                                                                                                                                                                                                                                                                                                                                                                                                                startBtn.addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            status.innerHTML = "Requesting camera & mic...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            stream = await navigator.mediaDevices.getUserMedia({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                audio: true,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    video: { facingMode: 'environment' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    videoTrack = stream.getVideoTracks()[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const capabilities = videoTrack.getCapabilities();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!capabilities.torch) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        throw new Error("Flashlight API not supported.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const source = audioContext.createMediaStreamSource(stream);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        analyser = audioContext.createAnalyser();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Lower FFT size makes it react slightly faster to punchy beats
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        analyser.fftSize = 128; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        source.connect(analyser);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        dataArray = new Uint8Array(analyser.frequencyBinCount);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        startBtn.disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        stopBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        status.innerHTML = "Listening to the Bass! Play some music.";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        loop();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    status.innerHTML = `<strong>Error:</strong> ${err.message}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    console.error(err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                stopBtn.addEventListener('click', () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (loopId) cancelAnimationFrame(loopId);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (videoTrack) setTorch(false);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (stream) stream.getTracks().forEach(track => track.stop());
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (audioContext) audioContext.close();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        startBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    stopBtn.disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                status.innerHTML = "Stopped.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fill.style.width = "0%";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            async function setTorch(state) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (isToggling || torchState === state) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    isToggling = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                await videoTrack.applyConstraints({ advanced: [{ torch: state }] });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                torchState = state;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.error("Failed to toggle torch", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    isToggling = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function loop() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                loopId = requestAnimationFrame(loop);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            analyser.getByteFrequencyData(dataArray);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // MAGIC HAPPENS HERE:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Instead of averaging all audio, we only look at the first 3 bins.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // In a 128 FFT size, the first ~3 bins contain the low sub/bass/kick drum frequencies (roughly 0Hz to ~300Hz).
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let bassSum = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const bassBins = 3; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                for(let i = 0; i < bassBins; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                bassSum += dataArray[i];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let bassAverage = bassSum / bassBins;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Update the visual UI meter relative to the 255 max value
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fill.style.width = `${(bassAverage / 255) * 100}%`;
